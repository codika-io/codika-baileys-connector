# Codika WhatsApp Group Connector
# Powered by Evolution API (Baileys engine)
#
# Do NOT edit this file. Run ./setup.sh to configure everything.

services:
  # ---------------------------------------------------------------------------
  # Setup UI  (management page for QR code scanning & status)
  # ---------------------------------------------------------------------------
  setup-ui:
    container_name: connector_ui
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_healthy
    ports:
      - "${SETUP_UI_PORT:-3000}:80"
    volumes:
      - ./setup-ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./setup-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - evolution-net

  # ---------------------------------------------------------------------------
  # Evolution API  (WhatsApp connector using Baileys)
  # ---------------------------------------------------------------------------
  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:${EVOLUTION_API_VERSION:-v2.3.7}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    environment:
      # --- Server ---
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # --- Authentication ---
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:?Set EVOLUTION_API_KEY in .env}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # --- Database (PostgreSQL) ---
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-evolution}:${POSTGRES_PASSWORD:-evolution_pass}@postgres:5432/${POSTGRES_DB:-evolution_db}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - DATABASE_SAVE_IS_ON_WHATSAPP=true
      - DATABASE_SAVE_IS_ON_WHATSAPP_DAYS=7

      # --- Redis Cache ---
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false

      # --- Webhook Forwarding ---
      - WEBHOOK_GLOBAL_ENABLED=${WEBHOOK_ENABLED:-true}
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_URL:?Set WEBHOOK_URL in .env}
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      # Message events (core)
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_EDITED=true
      - WEBHOOK_EVENTS_MESSAGES_DELETE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE_UPDATE=false
      # Connection events
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      # Group events
      - WEBHOOK_EVENTS_GROUPS_UPSERT=true
      - WEBHOOK_EVENTS_GROUPS_UPDATE=true
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=true
      # Disable events we don't need
      - WEBHOOK_EVENTS_CONTACTS_SET=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_SET=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_MESSAGES_SET=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_LABELS_EDIT=false
      - WEBHOOK_EVENTS_LABELS_ASSOCIATION=false
      - WEBHOOK_EVENTS_CALL=false
      - WEBHOOK_EVENTS_ERRORS=true
      # Webhook resilience
      - WEBHOOK_REQUEST_TIMEOUT_MS=60000
      - WEBHOOK_RETRY_MAX_ATTEMPTS=10
      - WEBHOOK_RETRY_INITIAL_DELAY_SECONDS=5
      - WEBHOOK_RETRY_USE_EXPONENTIAL_BACKOFF=true
      - WEBHOOK_RETRY_MAX_DELAY_SECONDS=300

      # --- Instance Management ---
      - DEL_INSTANCE=${DEL_INSTANCE:-false}

      # --- Session (Baileys) ---
      - CONFIG_SESSION_PHONE_CLIENT=${SESSION_PHONE_CLIENT:-Community Bot}
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - LOG_BAILEYS=error

      # --- QR Code ---
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#175197

      # --- Logging ---
      - LOG_LEVEL=ERROR,WARN,INFO,WEBHOOKS
      - LOG_COLOR=true

      # --- Telemetry ---
      - TELEMETRY_ENABLED=false

      # --- Integrations (all disabled - we use n8n webhooks instead) ---
      - CHATWOOT_ENABLED=false
      - TYPEBOT_ENABLED=false
      - OPENAI_ENABLED=false
      - DIFY_ENABLED=false
      - N8N_ENABLED=false
      - EVOAI_ENABLED=false
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - S3_ENABLED=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-evolution_db}
      - POSTGRES_USER=${POSTGRES_USER:-evolution}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution_pass}
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - listen_addresses=*
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - evolution-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  evolution_instances:   # Baileys auth state (survives restarts, no QR re-scan)
  postgres_data:         # Database storage
  redis_data:            # Redis persistence

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
