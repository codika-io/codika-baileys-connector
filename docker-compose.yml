# Codika WhatsApp Group Connector
# Powered by Evolution API (Baileys engine)
#
# Do NOT edit this file. Run ./setup.sh to configure everything.

services:
  # ---------------------------------------------------------------------------
  # Setup UI  (management page for QR code scanning & status)
  # ---------------------------------------------------------------------------
  setup-ui:
    container_name: connector_ui
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_healthy
    ports:
      - "${SETUP_UI_PORT:-3000}:80"
      - "${SETUP_UI_SSL_PORT:-3443}:443"
    volumes:
      - ./setup-ui/index.html:/usr/share/nginx/html/index.html:ro
      - ./setup-ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - evolution-net

  # ---------------------------------------------------------------------------
  # Evolution API  (WhatsApp connector using Baileys)
  # ---------------------------------------------------------------------------
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:${EVOLUTION_API_VERSION:-v2.3.7}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${EVOLUTION_API_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    environment:
      # --- Server ---
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # --- Authentication ---
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:?Set EVOLUTION_API_KEY in .env}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # --- Database (PostgreSQL) ---
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-evolution}:${POSTGRES_PASSWORD:-evolution_pass}@postgres:5432/${POSTGRES_DB:-evolution_db}?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - DATABASE_SAVE_IS_ON_WHATSAPP=true
      - DATABASE_SAVE_IS_ON_WHATSAPP_DAYS=7
      - DATABASE_DELETE_MESSAGE=true

      # --- Redis Cache ---
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false

      # --- Global Webhook (disabled - we use per-instance webhook instead) ---
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_GLOBAL_URL=
      # Webhook resilience (applies to per-instance webhooks too)
      - WEBHOOK_REQUEST_TIMEOUT_MS=60000
      - WEBHOOK_RETRY_MAX_ATTEMPTS=10
      - WEBHOOK_RETRY_INITIAL_DELAY_SECONDS=5
      - WEBHOOK_RETRY_USE_EXPONENTIAL_BACKOFF=true
      - WEBHOOK_RETRY_MAX_DELAY_SECONDS=300
      - WEBHOOK_RETRY_JITTER_FACTOR=0.2
      - WEBHOOK_RETRY_NON_RETRYABLE_STATUS_CODES=400,401,403,404,422

      # --- Instance Management ---
      - DEL_INSTANCE=${DEL_INSTANCE:-false}

      # --- Session (Baileys) ---
      - CONFIG_SESSION_PHONE_CLIENT=${SESSION_PHONE_CLIENT:-Community Bot}
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - LOG_BAILEYS=error

      # --- QR Code ---
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#175197

      # --- Logging ---
      - LOG_LEVEL=ERROR,WARN,INFO,WEBHOOKS
      - LOG_COLOR=true

      # --- Telemetry ---
      - TELEMETRY_ENABLED=false

      # --- Integrations (all disabled - we use n8n webhooks instead) ---
      - CHATWOOT_ENABLED=false
      - TYPEBOT_ENABLED=false
      - OPENAI_ENABLED=false
      - DIFY_ENABLED=false
      - N8N_ENABLED=false
      - EVOAI_ENABLED=false
      - RABBITMQ_ENABLED=false
      - SQS_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - S3_ENABLED=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    container_name: evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-evolution_db}
      - POSTGRES_USER=${POSTGRES_USER:-evolution}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution_pass}
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - listen_addresses=*
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evolution} -d ${POSTGRES_DB:-evolution_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - evolution-net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Certbot  (Let's Encrypt certificate renewal - only active with DOMAIN_NAME)
  # ---------------------------------------------------------------------------
  certbot:
    container_name: connector_certbot
    image: certbot/certbot:v2.11.0
    profiles: ["ssl"]
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - evolution-net

volumes:
  evolution_instances:   # Baileys auth state (survives restarts, no QR re-scan)
  postgres_data:         # Database storage
  redis_data:            # Redis persistence
  certbot_certs:         # Let's Encrypt certificates
  certbot_www:           # ACME challenge webroot

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
